<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>myFFL</title>
  <meta http-equiv="cache-control" content="no-cache">
  <meta http-equiv="pragma" content="no-cache">
  <link rel="icon" type="image/png" sizes="32x32" href="https://shamrock84.github.io/fflicons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="https://shamrock84.github.io/fflicons/favicon-16x16.png">
  <link rel="manifest" href="https://shamrock84.github.io/fflicons/site.webmanifest">
  <meta name="msapplication-TileColor" content="#da532c">
  <meta name="theme-color" content="#ffffff">

  <style>
    /* Small, modern layout replacing the old tables with a responsive grid */
    :root{--gap:12px;--card-min:220px}
    body{font-family: Arial, Helvetica, sans-serif;margin:1rem;background:#fff;color:#111}
    header{display:flex;flex-wrap:wrap;align-items:center;gap:1rem;margin-bottom:1rem}
    .view-buttons{display:flex;gap:.5rem;flex-wrap:wrap}
    .view-buttons button{padding:.6rem 1rem;border:1px solid #ccc;background:#fafafa;border-radius:6px;cursor:pointer}
    .view-buttons button[aria-pressed="true"]{background:#e7f3ff;border-color:#6aa8ff}

    main{display:block}
    .view{display:none}
    .view[aria-hidden="false"]{display:block}

    .leagues-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(var(--card-min),1fr));gap:var(--gap);align-items:start}
    .league-card{padding:1rem;border:1px solid #ddd;border-radius:6px;text-align:center;background:#fff}
    .league-card a{font-weight:700;color:#0b63c6;text-decoration:none;display:inline-block;margin-bottom:0.5rem}
    .league-card a:hover{text-decoration:underline}
    .league-card small{display:block;color:#666;font-size:0.85rem;margin-bottom:0.5rem}
    .league-card .widget-container{margin-top:0.5rem;border-top:1px solid #ddd;padding-top:0.5rem;overflow-x:auto}
    .league-card .widget-container table{width:100%;font-size:0.85rem;border-collapse:collapse}
    .league-card .widget-container th,
    .league-card .widget-container td{border:1px solid #ddd;padding:.35rem .45rem;text-align:left;vertical-align:top}
    .league-card .widget-container th{background:#f5f5f5}
    .league-card .widget-title{margin:.25rem 0 .5rem;font-size:.95rem}
    .league-card .status-message{margin-top:.5rem;padding:.75rem;border:1px solid #ddd;border-radius:6px;background:#fafafa;font-size:.9rem}
    .league-card .status-message.error{background:#fff4f4;border-color:#efc1c1;color:#8b1e1e}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

    /* Utility spacing to mimic old visual separation between rows */
    .view caption{font-weight:bold;margin-bottom:.5rem;display:block}

    /* Accessibility helper for focus */
    .view-buttons button:focus{outline:3px solid rgba(100,150,255,.25)}
  </style>

</head>
<body>
  <header>
    <h1 style="margin:0;font-size:1.25rem">myFFL</h1>
    <nav class="view-buttons" role="tablist" aria-label="Select view">
      <button data-view="scores" type="button" role="tab">Scores</button>
      <button data-view="rosters" type="button" role="tab">Rosters</button>
      <button data-view="standings" type="button" role="tab">Standings</button>
      <button data-view="bestball" type="button" role="tab">BestBall</button>
      <button data-view="schedules" type="button" role="tab">Schedules</button>
      <button data-view="news" type="button" role="tab">News</button>
      <button data-view="lineups" type="button" role="tab">Lineups</button>
    </nav>
  </header>

  <main>
    <!-- Views are semantic sections. Each view contains a grid that will be populated from the centralized leagues array. -->
    <section id="scoresView" class="view" aria-hidden="true">
      <caption>myFFL Scores</caption>
      <div class="leagues-grid" id="scoresGrid" aria-live="polite"></div>
    </section>

    <section id="rostersView" class="view" aria-hidden="true">
      <caption>myFFL Rosters</caption>
      <div class="leagues-grid" id="rostersGrid" aria-live="polite"></div>
    </section>

    <section id="standingsView" class="view" aria-hidden="true">
      <caption>myFFL Standings</caption>
      <div class="leagues-grid" id="standingsGrid" aria-live="polite"></div>
    </section>

    <section id="bestballView" class="view" aria-hidden="true">
      <caption>myFFL BestBall</caption>
      <div class="leagues-grid" id="bestballGrid" aria-live="polite"></div>
    </section>

    <section id="schedulesView" class="view" aria-hidden="true">
      <caption>myFFL Schedules</caption>
      <div class="leagues-grid" id="schedulesGrid" aria-live="polite"></div>
    </section>

    <section id="newsView" class="view" aria-hidden="true">
      <caption>myFFL News</caption>
      <div class="leagues-grid" id="newsGrid" aria-live="polite"></div>
    </section>

    <section id="lineupsView" class="view" aria-hidden="true">
      <caption>myFFL Lineups</caption>
      <div class="leagues-grid" id="lineupsGrid" aria-live="polite"></div>
    </section>
  </main>

  <script>
  (function(){
    'use strict';

    // Central config: change here if year or path changes
    const FFL = {
      year: '2026',
      homePath: 'home',
      apiBase: 'https://api.myfantasyleague.com',
      urlFor(host, id){ return `https://${host}.myfantasyleague.com/${this.year}/${this.homePath}/${id}` }
    };

    // Master list of leagues. Edit here to change every view.
    const leagues = [
      { host: 'www43', id: '26696', name: 'MNMx Dynasty', franchise: '0001', views: ['scores','rosters','schedules','standings','news','lineups'] },
      { host: 'www46', id: '35217', name: 'Iron Bank', franchise: '0004', views: ['scores','rosters','schedules','standings','news','lineups'] },
      { host: 'www49', id: '25608', name: 'OSD', franchise: '0004', views: ['scores','rosters','schedules','standings','news','lineups'] },
      { host: 'www46', id: '34850', name: 'Wise Guys', franchise: '0010', views: ['scores','rosters','schedules','standings','news','lineups'] },
      { host: 'www43', id: '23545', name: 'Survivor', franchise: '0008', views: ['scores','rosters','schedules','standings','news','lineups'] },
      { host: 'www47', id: '30641', name: 'Super Cap', franchise: '0003', views: ['scores','rosters','schedules','standings','news','lineups'] },
      { host: 'www43', id: '64470', name: 'Game On', franchise: '0005', views: ['scores','rosters','schedules','standings','news','lineups'] },
      { host: 'www42', id: '56191', name: 'Worlds Collide', franchise: '0008', views: ['bestball'] },
      { host: 'www43', id: '34203', name: "Rug's Playground", franchise: '0009', views: ['bestball'] }
    ];

    // Keep track of which views we've rendered and populated
    const renderedViews = new Set();
    const populatedViews = new Set();
    const apiCache = new Map();

    // Build DOM nodes safely
    function createLeagueCard(league){
      const card = document.createElement('article');
      card.className = 'league-card';

      const link = document.createElement('a');
      link.href = FFL.urlFor(league.host, league.id);
      link.textContent = league.name;
      link.rel = 'noopener noreferrer';
      link.target = '_blank';
      link.setAttribute('aria-label', `${league.name} (opens in new tab)`);

      const meta = document.createElement('small');
      meta.textContent = `${league.host}.myfantasyleague.com / ${league.id}`;

      card.appendChild(link);
      card.appendChild(meta);

      card.dataset.widgetId = league.id;
      card.dataset.widgetFranchise = league.franchise || '';

      return card;
    }

    // Render a single view into its grid element. This is safe and idempotent: if already rendered, no-op.
    function renderView(view){
      if (renderedViews.has(view)) return;
      const grid = document.getElementById(view + 'Grid');
      if (!grid) return;

      const list = leagues.filter(l => (l.views || []).indexOf(view) !== -1);
      // Create cards and append
      list.forEach(league => {
        const card = createLeagueCard(league);
        grid.appendChild(card);
      });

      renderedViews.add(view);
    }

    function asArray(value){
      if (Array.isArray(value)) return value;
      return value ? [value] : [];
    }

    function formatValue(value){
      return value === null || value === undefined || value === '' ? '—' : String(value);
    }

    function formatRecord(item){
      const wins = item.h2hw || item.w || item.wins || '0';
      const losses = item.h2hl || item.l || item.losses || '0';
      const ties = item.h2ht || item.t || item.ties || '0';
      return ties !== '0' ? `${wins}-${losses}-${ties}` : `${wins}-${losses}`;
    }

    function leagueApiUrl(type, leagueId, extraParams){
      const params = new URLSearchParams({ TYPE: type, L: leagueId, JSON: '1' });
      Object.entries(extraParams || {}).forEach(([key, value]) => {
        if (value !== null && value !== undefined && value !== '') params.set(key, value);
      });
      return `${FFL.apiBase}/${FFL.year}/export?${params.toString()}`;
    }

    function fetchCachedJson(cacheKey, url){
      if (!apiCache.has(cacheKey)) {
        apiCache.set(cacheKey,
          fetch(url).then(response => {
            if (!response.ok) throw new Error(`API request failed (${response.status})`);
            return response.json();
          }).catch(error => {
            apiCache.delete(cacheKey);
            throw error;
          })
        );
      }
      return apiCache.get(cacheKey);
    }

    function getLeagueInfo(league){
      return fetchCachedJson(`league:${league.id}`, leagueApiUrl('league', league.id));
    }

    function getStandings(league){
      return fetchCachedJson(`standings:${league.id}`, leagueApiUrl('standings', league.id));
    }

    function getRosters(league){
      return fetchCachedJson(`rosters:${league.id}`, leagueApiUrl('rosters', league.id));
    }

    function getWeeklyResults(league){
      return fetchCachedJson(`weeklyResults:${league.id}`, leagueApiUrl('weeklyResults', league.id));
    }

    function getPlayersByIds(playerIds){
      const ids = Array.from(new Set(asArray(playerIds).filter(Boolean)));
      if (!ids.length) return Promise.resolve(new Map());
      const params = new URLSearchParams({
        TYPE: 'players',
        DETAILS: '1',
        PLAYERS: ids.join(','),
        JSON: '1'
      });
      return fetchCachedJson(`players:${ids.slice().sort().join(',')}`, `${FFL.apiBase}/${FFL.year}/export?${params.toString()}`)
        .then(data => {
          const playerMap = new Map();
          asArray(data && data.players && data.players.player).forEach(player => {
            if (player && player.id) playerMap.set(player.id, player);
          });
          return playerMap;
        });
    }

    function getLeagueFranchises(leagueInfo){
      return asArray(
        leagueInfo &&
        leagueInfo.league &&
        ((leagueInfo.league.franchises && leagueInfo.league.franchises.franchise) || leagueInfo.league.franchise)
      );
    }

    function createWidgetContainer(titleText){
      const container = document.createElement('div');
      container.className = 'widget-container';
      if (titleText) {
        const title = document.createElement('h2');
        title.className = 'widget-title';
        title.textContent = titleText;
        container.appendChild(title);
      }
      return container;
    }

    function createStatusMessage(message, isError){
      const box = document.createElement('div');
      box.className = `status-message${isError ? ' error' : ''}`;
      box.textContent = message;
      return box;
    }

    function createTable(headers, rows, captionText){
      const table = document.createElement('table');
      if (captionText) {
        const caption = document.createElement('caption');
        caption.className = 'sr-only';
        caption.textContent = captionText;
        table.appendChild(caption);
      }
      const thead = document.createElement('thead');
      const headRow = document.createElement('tr');
      headers.forEach(header => {
        const th = document.createElement('th');
        th.scope = 'col';
        th.textContent = header;
        headRow.appendChild(th);
      });
      thead.appendChild(headRow);

      const tbody = document.createElement('tbody');
      rows.forEach(row => {
        const tr = document.createElement('tr');
        row.forEach(cell => {
          const td = document.createElement('td');
          if (cell instanceof Node) td.appendChild(cell);
          else td.textContent = formatValue(cell);
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });

      table.appendChild(thead);
      table.appendChild(tbody);
      return table;
    }

    function appendContent(card, content){
      const existing = card.querySelector('.widget-container, .status-message');
      if (existing) existing.remove();
      card.appendChild(content);
    }

    function getFranchiseMap(leagueInfo){
      const franchiseMap = new Map();
      getLeagueFranchises(leagueInfo).forEach(franchise => {
        if (franchise && franchise.id) franchiseMap.set(franchise.id, franchise);
      });
      return franchiseMap;
    }

    function renderScoresCard(leagueInfo, weeklyResults){
      const franchiseMap = getFranchiseMap(leagueInfo);
      const results = weeklyResults && weeklyResults.weeklyResults ? weeklyResults.weeklyResults : {};
      const matchups = asArray(results.matchup);
      const title = results.week ? `Week ${results.week} Scores` : 'Weekly Scores';
      const container = createWidgetContainer(title);

      if (!matchups.length) {
        container.appendChild(createStatusMessage('No score data available yet.', false));
        return container;
      }

      const rows = [];
      matchups.forEach(matchup => {
        const teams = asArray(matchup && matchup.franchise);
        const teamA = teams[0] || {};
        const teamB = teams[1] || {};
        rows.push([
          (franchiseMap.get(teamA.id) || {}).name || `Franchise ${formatValue(teamA.id)}`,
          formatValue(teamA.score),
          (franchiseMap.get(teamB.id) || {}).name || (teamB.id ? `Franchise ${teamB.id}` : 'Bye'),
          formatValue(teamB.score)
        ]);
      });

      container.appendChild(createTable(['Team', 'Score', 'Opponent', 'Opponent Score'], rows, title));
      return container;
    }

    function renderStandingsCard(leagueInfo, standingsData, titleText){
      const franchiseMap = getFranchiseMap(leagueInfo);
      const standings = asArray(
        standingsData &&
        standingsData.standings &&
        (standingsData.standings.franchise || standingsData.standings.franchise_standings)
      );
      const container = createWidgetContainer(titleText || 'Standings');

      if (!standings.length) {
        container.appendChild(createStatusMessage('No standings data available yet.', false));
        return container;
      }

      const rows = standings.map((item, index) => [
        index + 1,
        (franchiseMap.get(item.id || item.franchise_id) || {}).name || `Franchise ${formatValue(item.id || item.franchise_id)}`,
        formatRecord(item),
        formatValue(item.pf),
        formatValue(item.pa)
      ]);
      container.appendChild(createTable(['Rank', 'Team', 'Record', 'PF', 'PA'], rows, titleText || 'Standings'));
      return container;
    }

    function renderRosterCard(leagueInfo, rosterData, playerMap, franchiseId){
      const franchises = getRostersFranchises(rosterData);
      const roster = franchises.find(item => item && item.id === franchiseId);
      const franchiseName = (getFranchiseMap(leagueInfo).get(franchiseId) || {}).name || `Franchise ${franchiseId}`;
      const container = createWidgetContainer(`${franchiseName} Roster`);

      if (!roster) {
        container.appendChild(createStatusMessage('Roster data is unavailable for this franchise.', false));
        return container;
      }

      const players = asArray(roster.player);
      if (!players.length) {
        container.appendChild(createStatusMessage('No rostered players found.', false));
        return container;
      }

      const rows = players.map(item => {
        const player = playerMap.get(item.id) || {};
        return [
          player.name || item.id,
          player.position || '—',
          player.team || 'FA',
          item.status || 'ROSTER'
        ];
      });
      container.appendChild(createTable(['Player', 'Pos', 'NFL', 'Status'], rows, `${franchiseName} roster`));
      return container;
    }

    function getRostersFranchises(rosterData){
      return asArray(
        rosterData &&
        rosterData.rosters &&
        (rosterData.rosters.franchise || rosterData.rosters.franchises)
      );
    }

    function findFranchiseWeeklyResult(weeklyResults, franchiseId){
      const matchups = asArray(weeklyResults && weeklyResults.weeklyResults && weeklyResults.weeklyResults.matchup);
      return matchups
        .map(matchup => {
          const franchises = asArray(matchup && matchup.franchise);
          const franchise = franchises.find(item => item && item.id === franchiseId);
          return franchise ? { matchup, franchise, franchises } : null;
        })
        .find(Boolean) || null;
    }

    function toNumber(value){
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function renderScheduleCard(leagueInfo, weeklyResults, franchiseId){
      const franchiseMap = getFranchiseMap(leagueInfo);
      const result = findFranchiseWeeklyResult(weeklyResults, franchiseId);
      const week = weeklyResults && weeklyResults.weeklyResults && weeklyResults.weeklyResults.week;
      const teamName = (franchiseMap.get(franchiseId) || {}).name || `Franchise ${franchiseId}`;
      const container = createWidgetContainer(week ? `Week ${week} Matchup` : 'Current Matchup');

      if (!result) {
        container.appendChild(createStatusMessage('No matchup data available yet.', false));
        return container;
      }

      const opponent = result.franchises.find(item => item && item.id !== franchiseId) || {};
      const score = toNumber(result.franchise.score);
      const opponentScore = toNumber(opponent.score);
      const outcome = opponent.id ? (score > opponentScore ? 'W' : score < opponentScore ? 'L' : 'T') : '—';

      container.appendChild(createTable(['Team', 'Score', 'Opponent', 'Opponent Score', 'Result'], [[
        teamName,
        formatValue(result.franchise.score),
        (franchiseMap.get(opponent.id) || {}).name || (opponent.id ? `Franchise ${opponent.id}` : 'Bye'),
        formatValue(opponent.score),
        outcome
      ]], week ? `Week ${week} matchup` : 'Current matchup'));
      return container;
    }

    function renderLeagueInfoCard(leagueInfo, franchiseId){
      const leagueData = leagueInfo && leagueInfo.league ? leagueInfo.league : {};
      const franchiseMap = getFranchiseMap(leagueInfo);
      const franchiseName = (franchiseMap.get(franchiseId) || {}).name || `Franchise ${franchiseId}`;
      const starterCount = leagueData.starters && leagueData.starters.count;
      const totalTeams = getLeagueFranchises(leagueInfo).length;
      const regularSeasonEnd = leagueData.lastRegularSeasonWeek || leagueData.endWeek;
      const container = createWidgetContainer('League Info');
      container.appendChild(createTable(['Field', 'Value'], [
        ['League', leagueData.name || '—'],
        ['Your Team', franchiseName],
        ['Teams', totalTeams || '—'],
        ['Starters', starterCount || '—'],
        ['Last Regular Season Week', regularSeasonEnd || '—']
      ], 'League information'));
      return container;
    }

    function renderLineupCard(leagueInfo, weeklyResults, playerMap, franchiseId){
      const result = findFranchiseWeeklyResult(weeklyResults, franchiseId);
      const franchiseName = (getFranchiseMap(leagueInfo).get(franchiseId) || {}).name || `Franchise ${franchiseId}`;
      const week = weeklyResults && weeklyResults.weeklyResults && weeklyResults.weeklyResults.week;
      const container = createWidgetContainer(week ? `Week ${week} Lineup` : `${franchiseName} Lineup`);

      if (!result || !result.franchise) {
        container.appendChild(createStatusMessage('Lineup data is unavailable until weekly results are published.', false));
        return container;
      }

      const playerStats = new Map();
      asArray(result.franchise.player).forEach(player => {
        if (player && player.id) playerStats.set(player.id, player);
      });

      const starterIds = (result.franchise.starters || '').split(',').filter(Boolean);
      if (!starterIds.length) {
        container.appendChild(createStatusMessage('No starters were returned for this franchise.', false));
        return container;
      }

      const rows = starterIds.map(playerId => {
        const player = playerMap.get(playerId) || {};
        const stats = playerStats.get(playerId) || {};
        return [
          player.name || playerId,
          player.position || '—',
          player.team || 'FA',
          formatValue(stats.score)
        ];
      });
      container.appendChild(createTable(['Starter', 'Pos', 'NFL', 'Score'], rows, week ? `Week ${week} lineup` : `${franchiseName} lineup`));
      return container;
    }

    function renderCardContent(view, league, leagueInfo, standingsData, rosterData, weeklyResults, playerMap){
      switch (view) {
        case 'scores':
          return renderScoresCard(leagueInfo, weeklyResults);
        case 'standings':
          return renderStandingsCard(leagueInfo, standingsData, 'Standings');
        case 'bestball':
          return renderStandingsCard(leagueInfo, standingsData, 'Best Ball Standings');
        case 'rosters':
          return renderRosterCard(leagueInfo, rosterData, playerMap, league.franchise);
        case 'schedules':
          return renderScheduleCard(leagueInfo, weeklyResults, league.franchise);
        case 'news':
          return renderLeagueInfoCard(leagueInfo, league.franchise);
        case 'lineups':
          return renderLineupCard(leagueInfo, weeklyResults, playerMap, league.franchise);
        default:
          return createStatusMessage('This view is not available.', true);
      }
    }

    async function populateView(view){
      if (populatedViews.has(view)) return;
      const grid = document.getElementById(view + 'Grid');
      if (!grid) return;

      const list = leagues.filter(l => (l.views || []).includes(view));
      await Promise.all(list.map(async league => {
        const card = Array.from(grid.querySelectorAll('.league-card')).find(item => item.dataset.widgetId === league.id);
        if (!card) return;

        appendContent(card, createStatusMessage('Loading league data…', false));

        try {
          const needsStandings = view === 'standings' || view === 'bestball';
          const needsRosters = view === 'rosters';
          const needsWeeklyResults = view === 'scores' || view === 'schedules' || view === 'lineups';
          const [leagueInfo, standingsData, rosterData, weeklyResults] = await Promise.all([
            getLeagueInfo(league),
            needsStandings ? getStandings(league) : Promise.resolve(null),
            needsRosters ? getRosters(league) : Promise.resolve(null),
            needsWeeklyResults ? getWeeklyResults(league) : Promise.resolve(null)
          ]);
          let playerMap = new Map();
          if (view === 'rosters') {
            const roster = getRostersFranchises(rosterData).find(item => item && item.id === league.franchise);
            playerMap = await getPlayersByIds(asArray(roster && roster.player).map(player => player && player.id));
          } else if (view === 'lineups') {
            const result = findFranchiseWeeklyResult(weeklyResults, league.franchise);
            const starterIds = (result && result.franchise && result.franchise.starters ? result.franchise.starters : '')
              .split(',')
              .filter(Boolean);
            playerMap = await getPlayersByIds(starterIds);
          }

          appendContent(card, renderCardContent(view, league, leagueInfo, standingsData, rosterData, weeklyResults, playerMap));
        } catch (error) {
          console.error(`Failed to load ${view} data for league ${league.id}`, error);
          appendContent(card, createStatusMessage('Unable to load league data right now.', true));
        }
      }));

      populatedViews.add(view);
    }

    // Highlight team names by searching visible league cards' text
    function highlightTeamsInView(view){
      const viewSection = document.getElementById(view + 'View');
      if (!viewSection) return;
      const teamNames = [
        'RUMBLE FISH','PC LOAD LETTER','THE MERGE','HODOR','CAPO DEI CAPI','THORGASM',
        'ALL YOUR BASE ARE BELONG TO US','BLUE STEEL','IONATH KRAKENS','JEFF\'S POLISH MALE ORDER',
        'JLCS BUTT PLUG','CAMEL TOE CAMO','ALEXANDER MATTISONS NECK'
      ];

      viewSection.querySelectorAll('.league-card').forEach(card => {
        const text = (card.textContent || '').toUpperCase();
        const match = teamNames.some(name => text.includes(name));
        if (match){
          card.style.backgroundColor = 'yellow';
          card.style.fontWeight = 'bold';
        } else {
          card.style.backgroundColor = '#fff';
          card.style.fontWeight = 'normal';
        }
      });
    }

    // Show and hide views; attach ARIA states for accessibility
    async function showView(view){
      // Render content for the view if needed
      renderView(view);

      // Update visibility and ARIA
      document.querySelectorAll('.view').forEach(sec => {
        const hidden = sec.id !== view + 'View';
        sec.setAttribute('aria-hidden', hidden ? 'true' : 'false');
      });

      // Update tab buttons pressed state
      document.querySelectorAll('.view-buttons button').forEach(btn => {
        const isPressed = btn.dataset.view === view;
        btn.setAttribute('aria-pressed', isPressed ? 'true' : 'false');
      });

      // Populate API data for this view lazily
      await populateView(view);
      highlightTeamsInView(view);
    }

    // Wire up view buttons (no inline handlers)
    function wireViewButtons(){
      document.querySelectorAll('.view-buttons button').forEach(btn => {
        btn.addEventListener('click', () => {
          const view = btn.dataset.view;
          if (!view) return;
          showView(view);
        });
      });
    }

    // Public init
    document.addEventListener('DOMContentLoaded', () => {
      wireViewButtons();
      // Default view
      showView('rosters');
    });

    // Expose some diagnostics to window for debugging (safe, non-critical)
    window._myffl = { FFL, leagues, renderView, populateView, showView };

  })();
  </script>
</body>
</html>
